<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <rect width="400" height="250" fill="#f8f9fa" rx="8"/>
  <text x="200" y="30" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#333">border: 1px solid (double borders)</text>
  <rect x="20" y="50" width="170" height="40" fill="none" stroke="#2563eb" stroke-width="2"/>
  <rect x="210" y="50" width="170" height="40" fill="none" stroke="#2563eb" stroke-width="2"/>
  <text x="105" y="75" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#2563eb">A</text>
  <text x="295" y="75" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#2563eb">B</text>
  <rect x="20" y="95" width="170" height="40" fill="none" stroke="#2563eb" stroke-width="2"/>
  <rect x="210" y="95" width="170" height="40" fill="none" stroke="#2563eb" stroke-width="2"/>
  <text x="105" y="120" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#2563eb">C</text>
  <text x="295" y="120" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#2563eb">D</text>
  <line x1="20" y1="50" x2="20" y2="135" stroke="#2563eb" stroke-width="2"/>
  <line x1="380" y1="50" x2="380" y2="135" stroke="#2563eb" stroke-width="2"/>
  <text x="200" y="165" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">⬆ Each cell has its own border (gaps between cells)</text>
</svg>