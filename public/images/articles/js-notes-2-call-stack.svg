<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 350">
  <rect width="400" height="350" fill="#f8f9fa" rx="8"/>
  <text x="200" y="25" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#333">JavaScript Call Stack</text>
  <rect x="100" y="50" width="200" height="40" fill="#3b82f6" rx="4"/>
  <text x="200" y="75" text-anchor="middle" font-family="monospace" font-size="12" fill="#fff">c()</text>
  <rect x="100" y="95" width="200" height="40" fill="#60a5fa" rx="4"/>
  <text x="200" y="120" text-anchor="middle" font-family="monospace" font-size="12" fill="#fff">b()</text>
  <rect x="100" y="140" width="200" height="40" fill="#93c5fd" rx="4"/>
  <text x="200" y="165" text-anchor="middle" font-family="monospace" font-size="12" fill="#1e40af">a()</text>
  <text x="310" y="75" font-family="sans-serif" font-size="11" fill="#888">← Top (executing)</text>
  <text x="310" y="160" font-family="sans-serif" font-size="11" fill="#888">← Bottom</text>
  <text x="200" y="215" text-anchor="middle" font-family="monospace" font-size="12" fill="#666">console.trace()</text>
  <text x="200" y="235" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">LIFO: Last In, First Out</text>
  <rect x="60" y="260" width="280" height="70" fill="#fef3c7" rx="6"/>
  <text x="200" y="280" text-anchor="middle" font-family="monospace" font-size="11" fill="#92400e">function a() { b(); }</text>
  <text x="200" y="298" text-anchor="middle" font-family="monospace" font-size="11" fill="#92400e">function b() { c(); }</text>
  <text x="200" y="316" text-anchor="middle" font-family="monospace" font-size="11" fill="#92400e">function c() { console.trace(); }</text>
</svg>