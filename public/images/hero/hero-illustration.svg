<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
    <filter id="shadow1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#2563EB" flood-opacity="0.15"/>
    </filter>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="600" height="500" rx="24" fill="url(#bg)"/>

  <!-- Decorative dots -->
  <circle cx="50" cy="80" r="4" fill="#2563EB" opacity="0.2"/>
  <circle cx="550" cy="120" r="6" fill="#10B981" opacity="0.2"/>
  <circle cx="80" cy="420" r="5" fill="#F59E0B" opacity="0.2"/>
  <circle cx="530" cy="400" r="3" fill="#2563EB" opacity="0.15"/>

  <!-- Laptop base -->
  <path d="M120 370 L160 430 Q165 440 175 440 L425 440 Q435 440 440 430 L480 370" fill="#475569" stroke="#334155" stroke-width="2"/>
  <rect x="250" y="440" width="100" height="6" rx="3" fill="#334155"/>

  <!-- Screen body -->
  <rect x="100" y="60" width="400" height="310" rx="16" fill="url(#screen)" filter="url(#shadow1)"/>

  <!-- Screen content - top bar -->
  <rect x="100" y="60" width="400" height="40" rx="16" fill="#1E293B"/>
  <rect x="100" y="84" width="400" height="16" fill="#1E293B"/>
  <!-- Window dots -->
  <circle cx="128" cy="80" r="6" fill="#EF4444"/>
  <circle cx="148" cy="80" r="6" fill="#F59E0B"/>
  <circle cx="168" cy="80" r="6" fill="#10B981"/>
  <!-- URL bar -->
  <rect x="200" y="72" width="200" height="16" rx="8" fill="#334155"/>

  <!-- Screen sidebar -->
  <rect x="116" y="112" width="80" height="242" rx="8" fill="#1E293B"/>
  <!-- Sidebar items -->
  <rect x="128" y="128" width="56" height="8" rx="4" fill="#475569"/>
  <rect x="128" y="148" width="40" height="8" rx="4" fill="#475569"/>
  <rect x="128" y="168" width="48" height="8" rx="4" fill="#475569"/>
  <rect x="128" y="188" width="36" height="8" rx="4" fill="#475569"/>
  <rect x="128" y="208" width="52" height="8" rx="4" fill="#475569"/>

  <!-- Main content area -->
  <rect x="208" y="112" width="276" height="242" rx="8" fill="#0F172A"/>

  <!-- Content blocks -->
  <!-- Heading -->
  <rect x="224" y="128" width="180" height="12" rx="6" fill="#334155"/>

  <!-- Text lines -->
  <rect x="224" y="152" width="244" height="8" rx="4" fill="#334155" opacity="0.6"/>
  <rect x="224" y="168" width="200" height="8" rx="4" fill="#334155" opacity="0.6"/>
  <rect x="224" y="184" width="220" height="8" rx="4" fill="#334155" opacity="0.6"/>

  <!-- Feature cards -->
  <rect x="224" y="212" width="120" height="80" rx="8" fill="#1E293B"/>
  <rect x="240" y="224" width="88" height="8" rx="4" fill="#2563EB" opacity="0.6"/>
  <rect x="240" y="240" width="72" height="6" rx="3" fill="#475569"/>
  <rect x="240" y="254" width="80" height="6" rx="3" fill="#475569"/>

  <rect x="356" y="212" width="120" height="80" rx="8" fill="#1E293B"/>
  <rect x="372" y="224" width="88" height="8" rx="4" fill="#10B981" opacity="0.6"/>
  <rect x="372" y="240" width="72" height="6" rx="3" fill="#475569"/>
  <rect x="372" y="254" width="80" height="6" rx="3" fill="#475569"/>

  <!-- Progress bar section -->
  <rect x="224" y="308" width="244" height="8" rx="4" fill="#1E293B"/>
  <rect x="224" y="308" width="160" height="8" rx="4" fill="url(#bar1)"/>

  <!-- Floating elements -->
  <!-- Chart card -->
  <g filter="url(#shadow2)">
    <rect x="60" y="200" width="100" height="60" rx="12" fill="white"/>
    <rect x="76" y="216" width="68" height="6" rx="3" fill="#2563EB" opacity="0.2"/>
    <rect x="76" y="230" width="56" height="16" rx="4" fill="#2563EB"/>
    <rect x="76" y="234" width="40" height="4" rx="2" fill="white" opacity="0.3"/>
  </g>

  <!-- Rating card -->
  <g filter="url(#shadow2)">
    <rect x="440" y="150" width="90" height="50" rx="12" fill="white"/>
    <rect x="456" y="162" width="58" height="6" rx="3" fill="#F59E0B" opacity="0.2"/>
    <text x="456" y="190" font-size="14" font-weight="bold" fill="#1E293B" font-family="system-ui">4.9</text>
    <circle cx="500" cy="182" r="4" fill="#F59E0B"/>
    <circle cx="512" cy="182" r="4" fill="#F59E0B"/>
    <circle cx="524" cy="182" r="4" fill="#F59E0B"/>
  </g>

  <!-- Floating checkmark -->
  <g filter="url(#shadow2)">
    <circle cx="480" cy="310" r="20" fill="#10B981"/>
    <path d="M474 310 L478 314 L486 306" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
