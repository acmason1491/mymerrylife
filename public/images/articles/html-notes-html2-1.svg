<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 350">
  <rect width="400" height="350" fill="#f8f9fa" rx="8"/>
  <text x="200" y="25" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#333">HTML Document Structure</text>
  <text x="20" y="55" font-family="monospace" font-size="12" fill="#2563eb">&lt;!DOCTYPE html&gt;</text>
  <text x="20" y="75" font-family="monospace" font-size="12" fill="#e11d48">&lt;html&gt;</text>
  <text x="40" y="100" font-family="monospace" font-size="12" fill="#059669">&lt;head&gt;</text>
  <text x="60" y="125" font-family="monospace" font-size="11" fill="#666">&lt;meta charset="UTF-8"&gt;</text>
  <text x="60" y="145" font-family="monospace" font-size="11" fill="#666">&lt;title&gt;Page Title&lt;/title&gt;</text>
  <text x="40" y="165" font-family="monospace" font-size="12" fill="#059669">&lt;/head&gt;</text>
  <text x="40" y="190" font-family="monospace" font-size="12" fill="#d97706">&lt;body&gt;</text>
  <text x="60" y="215" font-family="monospace" font-size="11" fill="#666">&lt;h1&gt;Heading&lt;/h1&gt;</text>
  <text x="60" y="235" font-family="monospace" font-size="11" fill="#666">&lt;p&gt;Paragraph text&lt;/p&gt;</text>
  <text x="60" y="255" font-family="monospace" font-size="11" fill="#666">&lt;img src="..." alt="..."&gt;</text>
  <text x="40" y="280" font-family="monospace" font-size="12" fill="#d97706">&lt;/body&gt;</text>
  <text x="20" y="305" font-family="monospace" font-size="12" fill="#e11d48">&lt;/html&gt;</text>
</svg>